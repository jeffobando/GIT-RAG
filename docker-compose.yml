# version: "3.9"

services:
  # --------------------------
  # Base de datos PostgreSQL
  # --------------------------
  rag_db:
    image: postgres:15
    container_name: rag_db
    restart: always
    environment:
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --------------------------
  # API FastAPI (desarrollo)
  # --------------------------
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    container_name: rag_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./API:/app
      - /app/__pycache__
    env_file:
      - ./API/.env
    depends_on:
      - rag_db

  # --------------------------
  # UI Vite/Node (desarrollo)
  # --------------------------
  ui:
    build:
      context: ./UI
      dockerfile: Dockerfile
    container_name: rag_ui
    working_dir: /app
    ports:
      - "5173:5173"
    env_file:
      - ./UI/.env
    depends_on:
      - api
    volumes:
      - ./UI:/app
      - /app/node_modules
    command: npm run dev -- --host

# --------------------------
# Volúmenes persistentes
# --------------------------
volumes:
  pgdata: